        /* Center Pane - Processing Grid */

        .grid-header {

        .grid-btn {

        .grid-btn:hover {

        .processing-grid {

        .transactions-table {

        .transactions-table thead {

        }

        .transactions-table td {

            border-bottom: 1px solid #E2E8F0;

        }

        .transactions-table tbody tr {
            cursor: pointer;

        .transactions-table tbody tr:hover {

        .transactions-table tbody tr.selected {

        .status-indicator {

        }

        .status-dot {

        .status-dot.matched {

        .status-dot.unmatched {

        .status-text {

        .status-text.matched {

        /* Right Pane - Mapping Sidebar */
        .right-pane {
            width: 320px;

            display: flex;

            overflow-y: auto;
        }

        .mapping-header {
            font-size: 12px;

            margin-bottom: 16px;

        }

        .mapping-section {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .mapping-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748B;
            margin-bottom: 8px;
        }

        .mapping-value {
            font-size: 11px;
            font-weight: 500;
            color: #1E293B;
            margin-bottom: 4px;
        }

        .mapping-select {

        .mapping-select:focus {
            outline: none;

        }

        .mapping-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .mapping-btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid #E2E8F0;
            background: #FFFFFF;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #1E293B;
        }

        .mapping-btn:hover {
            background: #EFF6FF;
            border-color: #2563EB;
            color: #2563EB;
        }

        .mapping-btn.primary {
            background: #2563EB;
            color: #FFFFFF;
            border-color: #2563EB;
        }

        .mapping-btn.primary:hover {
            background: #1D4ED8;
            border-color: #1D4ED8;
        }

        .empty-state {
            display: flex;
            flex-direction: column;

        }

        .empty-state-icon {
            font-size: 40px;

            opacity: 0.5;
        }

        .empty-state-text {

        }

        .empty-state-subtext {

        }

        .hub-footer {
            background: #FFFFFF;
            border-top: 1px solid #E2E8F0;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-info {
            font-size: 10px;
            color: #64748B;
        }

        .post-button {
            padding: 10px 24px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #10B981;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;

            transition: all 0.2s;

        .post-button:hover {

        }

        .post-button:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
        }
    </style>

    <div class="hub-header">
        <h2>Statement Import Hub</h2>
        <div class="hub-stats">
            <div>Total: <span id="totalTransactions">0</span></div>
            <div>Matched: <span id="matchedCount" style="color: #10B981;">0</span></div>
            <div>Unmatched: <span id="unmatchedCount" style="color: #64748B;">0</span></div>
        </div>
    </div>

    <div class="hub-workspace">
        <!-- Left Pane - Drop Zone -->
        <div class="left-pane">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="drop-zone-icon">📄</div>
                <div class="drop-zone-text">Drop Statement Here</div>
                <div class="drop-zone-subtext">PDF or Excel (.xlsx, .csv)</div>
                <input type="file" id="fileInput" accept=".pdf,.xlsx,.csv" style="display: none;" onchange="handleFileSelect(event)">
            </div>
            <div class="uploaded-files" id="uploadedFiles"></div>
        </div>

        <!-- Center Pane - Processing Grid -->
        <div class="center-pane">
            <div class="grid-header">
                <div class="grid-header-title">Transaction Processing Grid</div>
                <div class="grid-actions">
                    <button class="grid-btn" onclick="clearAll()">Clear All</button>
                    <button class="grid-btn" onclick="reprocessAll()">Reprocess</button>
                </div>
            </div>
            <div class="processing-grid">
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th width="50">Status</th>
                            <th width="120">Date</th>
                            <th width="150">Reference</th>
                            <th>Description</th>
                            <th width="120">Debit</th>
                            <th width="120">Credit</th>
                            <th width="150">Account</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right Pane - Mapping Sidebar -->
        <div class="right-pane" id="rightPane">
            <div class="empty-state">
                <div class="empty-state-icon">🔗</div>
                <div class="empty-state-text">Select a transaction</div>
                <div class="empty-state-subtext">to map it to an account</div>
            </div>
        </div>
    </div>

    <div class="hub-footer">
        <div class="footer-info">Ready to post <span id="readyToPost">0</span> transactions to ledger</div>
        <button class="post-button" id="postButton" onclick="postToLedger()" disabled>Post to Ledger</button>
    </div>
</div>

<script>
    (function() {
        let transactions = [];
        let selectedTransactionId = null;
        let uploadedFiles = [];

        // Drag and drop handlers
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        function handleFileSelect(event) {
            const files = event.target.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            for (let file of files) {
                if (file.name.endsWith('.pdf') || file.name.endsWith('.xlsx') || file.name.endsWith('.csv')) {
                    uploadedFiles.push({
                        name: file.name,
                        size: formatFileSize(file.size),
                        file: file
                    });
                }
            }
            updateUploadedFiles();
            simulateProcessing();
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function updateUploadedFiles() {
            const container = document.getElementById('uploadedFiles');
            container.innerHTML = uploadedFiles.map((file, index) => `
                <div class="uploaded-file-item">
                    <div class="uploaded-file-icon">📄</div>
                    <div class="uploaded-file-info">
                        <div class="uploaded-file-name">${file.name}</div>
                        <div class="uploaded-file-size">${file.size}</div>
                    </div>
                    <div class="uploaded-file-remove" onclick="removeFile(${index})">×</div>
                </div>
            `).join('');
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            updateUploadedFiles();
        }

        function simulateProcessing() {
            // Simulate OCR processing with sample data
            const sampleTransactions = [
                { id: 1, date: '2024-04-15', reference: 'TXN001', description: 'Maintenance Payment - Flat 101', debit: 5000.00, credit: 0, status: 'matched', account: 'Maintenance Account' },
                { id: 2, date: '2024-04-15', reference: 'TXN002', description: 'Water Bill Payment', debit: 350.00, credit: 0, status: 'unmatched', account: '' },
                { id: 3, date: '2024-04-16', reference: 'TXN003', description: 'Sinking Fund Contribution', debit: 2000.00, credit: 0, status: 'matched', account: 'Sinking Fund' },
                { id: 4, date: '2024-04-16', reference: 'TXN004', description: 'Unknown Deposit', debit: 0, credit: 15000.00, status: 'unmatched', account: '' },
                { id: 5, date: '2024-04-17', reference: 'TXN005', description: 'Electricity Bill', debit: 8500.00, credit: 0, status: 'matched', account: 'Electricity Expense' },
                { id: 6, date: '2024-04-17', reference: 'TXN006', description: 'Insurance Premium', debit: 12000.00, credit: 0, status: 'unmatched', account: '' },
            ];

            transactions = sampleTransactions;
            renderTransactions();
            updateStats();
        }

        function renderTransactions() {
            const tbody = document.getElementById('transactionsBody');
            tbody.innerHTML = transactions.map(t => `
                <tr class="${t.status} ${selectedTransactionId === t.id ? 'selected' : ''}" onclick="selectTransaction(${t.id})">
                    <td>
                        <div class="status-indicator">
                            <div class="status-dot ${t.status}"></div>
                            <span class="status-text ${t.status}">${t.status}</span>
                        </div>
                    </td>
                    <td>${t.date}</td>
                    <td>${t.reference}</td>
                    <td>${t.description}</td>
                    <td>${t.debit > 0 ? '₹' + t.debit.toFixed(2) : '-'}</td>
                    <td>${t.credit > 0 ? '₹' + t.credit.toFixed(2) : '-'}</td>
                    <td>${t.account || '<em style="color: #EF4444;">Not Mapped</em>'}</td>
                </tr>
            `).join('');
        }

        function selectTransaction(id) {
            selectedTransactionId = id;
            renderTransactions();
            showMappingSidebar(id);
        }

        function showMappingSidebar(id) {
            const transaction = transactions.find(t => t.id === id);
            const rightPane = document.getElementById('rightPane');

            if (!transaction) return;

            rightPane.innerHTML = `
                <div class="mapping-header">Map Transaction</div>
                <div class="mapping-section">
                    <div class="mapping-label">Transaction Details</div>
                    <div class="mapping-value"><strong>Date:</strong> ${transaction.date}</div>
                    <div class="mapping-value"><strong>Reference:</strong> ${transaction.reference}</div>
                    <div class="mapping-value"><strong>Description:</strong> ${transaction.description}</div>
                    <div class="mapping-value"><strong>Amount:</strong> ₹${(transaction.debit || transaction.credit).toFixed(2)}</div>
                </div>

                <div class="mapping-section">
                    <div class="mapping-label">Map to Account</div>
                    <select class="mapping-select" id="accountSelect">
                        <option value="">-- Select Account --</option>
                        <option value="maintenance">Maintenance Account</option>
                        <option value="sinking">Sinking Fund</option>
                        <option value="electricity">Electricity Expense</option>
                        <option value="water">Water Expense</option>
                        <option value="insurance">Insurance Expense</option>
                        <option value="repair">Repairs & Maintenance</option>
                        <option value="other">Other Income/Expense</option>
                    </select>
                </div>

                <div class="mapping-section">
                    <div class="mapping-label">Map to Member (Optional)</div>
                    <select class="mapping-select" id="memberSelect">
                        <option value="">-- Select Member --</option>
                        <option value="101">Flat 101 - Mr. Sharma</option>
                        <option value="102">Flat 102 - Ms. Patel</option>
                        <option value="103">Flat 103 - Mr. Kumar</option>
                        <option value="104">Flat 104 - Mrs. Gupta</option>
                    </select>
                </div>

                <div class="mapping-actions">
                    <button class="mapping-btn" onclick="cancelMapping()">Cancel</button>
                    <button class="mapping-btn primary" onclick="saveMapping(${transaction.id})">Save Mapping</button>
                </div>
            `;
        }

        function cancelMapping() {
            selectedTransactionId = null;
            renderTransactions();
            document.getElementById('rightPane').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🔗</div>
                    <div class="empty-state-text">Select a transaction</div>
                    <div class="empty-state-subtext">to map it to an account</div>
                </div>
            `;
        }

        function saveMapping(id) {
            const accountSelect = document.getElementById('accountSelect');
            const memberSelect = document.getElementById('memberSelect');

            if (!accountSelect.value) {
                alert('Please select an account');
                return;
            }

            const transaction = transactions.find(t => t.id === id);
            if (transaction) {
                transaction.status = 'matched';
                transaction.account = accountSelect.options[accountSelect.selectedIndex].text;
                if (memberSelect.value) {
                    transaction.member = memberSelect.options[memberSelect.selectedIndex].text;
                }
            }

            renderTransactions();
            updateStats();
            cancelMapping();
        }

        function updateStats() {
            const total = transactions.length;
            const matched = transactions.filter(t => t.status === 'matched').length;
            const unmatched = transactions.filter(t => t.status === 'unmatched').length;

            document.getElementById('totalTransactions').textContent = total;
            document.getElementById('matchedCount').textContent = matched;
            document.getElementById('unmatchedCount').textContent = unmatched;
            document.getElementById('readyToPost').textContent = matched;

            const postButton = document.getElementById('postButton');
            postButton.disabled = matched === 0 || unmatched > 0;
        }

        function clearAll() {
            if (confirm('Are you sure you want to clear all transactions?')) {
                transactions = [];
                selectedTransactionId = null;
                renderTransactions();
                updateStats();
                cancelMapping();
            }
        }

        function reprocessAll() {
            if (uploadedFiles.length === 0) {
                alert('Please upload a statement file first');
                return;
            }
            simulateProcessing();
        }

        function postToLedger() {
            const matched = transactions.filter(t => t.status === 'matched');
            if (matched.length === 0) {
                alert('No matched transactions to post');
                return;
            }

            if (confirm(`Post ${matched.length} transactions to ledger?`)) {
                // Simulate posting to ledger
                alert('Transactions posted successfully to ledger!');
                transactions = [];
                renderTransactions();
                updateStats();
                cancelMapping();
            }
        }

        // Expose functions to global scope
        window.handleFileSelect = handleFileSelect;
        window.removeFile = removeFile;
        window.selectTransaction = selectTransaction;
        window.cancelMapping = cancelMapping;
        window.saveMapping = saveMapping;
        window.clearAll = clearAll;
        window.reprocessAll = reprocessAll;
        window.postToLedger = postToLedger;
    })();
</script>
