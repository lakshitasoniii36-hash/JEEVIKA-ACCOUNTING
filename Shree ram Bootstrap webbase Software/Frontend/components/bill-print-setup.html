<!-- MODULE: Bill Print Setup — Classic Desktop ERP Redesign -->
<style>
#bps-other-dropdown:hover #bps-other-content { display: block !important; }
#bps-other-content a:hover { background: #E3F2FD !important; color: #1565C0 !important; }
</style>

<div class="classic-erp-canvas" id="bps-panel" style="display:flex; flex-direction:column; height:100%; overflow:hidden;">

  <!-- MODULE HEADER -->
  <div class="module-header">
    <div>
      <h2 class="module-title">Bill Print Setup</h2>
      <div class="module-subtitle">
        <span><i class="bi bi-geo-alt"></i> <span class="module-society"></span></span>
        <span class="sep">|</span>
        <span><i class="bi bi-calendar3"></i> <span class="module-year"></span></span>
      </div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <span style="font-size:10px; color:#9E9E9E; font-weight:600; text-transform:uppercase;">
        [Layout Configuration]
      </span>
    </div>
  </div>

  <!-- STATIC TOP ERP COMMAND STRIP -->
  <div class="classic-erp-footer-strip" id="bps-top-strip" style="border-top:none !important; border-bottom:1px solid #E0E0E0 !important; background:#F5F5F5 !important; padding:6px 14px; display:flex; align-items:center; gap:6px; flex-shrink:0; margin-top:0;">
    <button class="classic-erp-btn" onclick="BPS.saveConfig()"><i class="bi bi-save"></i> SAVE</button>
    <button class="classic-erp-btn" onclick="BPS.resetConfig()"><i class="bi bi-arrow-counterclockwise"></i> RESET</button>
    <div style="border-right:1px solid #E0E0E0; height:20px; margin:0 4px;"></div>
    <button class="classic-erp-btn" onclick="BPS.previewBill()"><i class="bi bi-eye"></i> PREVIEW</button>
    
    <!-- OTHER DROPDOWN MENU -->
    <div class="classic-erp-dropdown" style="position:relative; display:inline-block;" id="bps-other-dropdown">
      <button class="classic-erp-btn" id="bps-btn-other">OTHER <i class="bi bi-chevron-down"></i></button>
      <div id="bps-other-content" style="display:none; position:absolute; top:28px; left:0; background:#FFFFFF; border:1px solid #BDBDBD; box-shadow:0 4px 10px rgba(0,0,0,0.1); z-index:1000; min-width:180px; padding:4px 0; border-radius:4px;">
        <a href="#" onclick="event.preventDefault(); BPS.action('Import Settings')" style="display:block; padding:6px 12px; color:#333; text-decoration:none; font-size:11px; font-weight:600; border-bottom:1px solid #F0F0F0;"><i class="bi bi-download"></i> Import Settings</a>
        <a href="#" onclick="event.preventDefault(); BPS.action('Export Settings')" style="display:block; padding:6px 12px; color:#333; text-decoration:none; font-size:11px; font-weight:600; border-bottom:1px solid #F0F0F0;"><i class="bi bi-upload"></i> Export Settings</a>
        <a href="#" onclick="event.preventDefault(); BPS.action('Reset Default Layout')" style="display:block; padding:6px 12px; color:#333; text-decoration:none; font-size:11px; font-weight:600; border-bottom:1px solid #F0F0F0;"><i class="bi bi-arrow-counterclockwise"></i> Reset Default Layout</a>
        <a href="#" onclick="event.preventDefault(); BPS.action('Duplicate Template')" style="display:block; padding:6px 12px; color:#333; text-decoration:none; font-size:11px; font-weight:600; border-bottom:1px solid #F0F0F0;"><i class="bi bi-files"></i> Duplicate Template</a>
        <a href="#" onclick="event.preventDefault(); BPS.action('Backup Configuration')" style="display:block; padding:6px 12px; color:#333; text-decoration:none; font-size:11px; font-weight:600; border-bottom:1px solid #F0F0F0;"><i class="bi bi-shield-lock"></i> Backup Configuration</a>
        <a href="#" onclick="event.preventDefault(); BPS.action('Restore Configuration')" style="display:block; padding:6px 12px; color:#333; text-decoration:none; font-size:11px; font-weight:600;"><i class="bi bi-folder2-open"></i> Restore Configuration</a>
      </div>
    </div>
    
    <button class="classic-erp-btn" style="margin-left:auto;" onclick="BPS.exit()"><i class="bi bi-door-open"></i> EXIT</button>
  </div>

  <!-- MAIN OPERATIONAL WORKSPACE -->
  <div style="flex:1; display:flex; flex-direction:column; overflow-y:auto; background:#E0E0E0; padding:6px;">
    
    <div class="classic-erp-frame" style="margin:0 !important; background:#FFFFFF !important; border:1px solid #E0E0E0 !important; border-radius:4px; padding:14px !important; position:relative; flex:1; display:flex; flex-direction:column;">
      <div class="classic-erp-frame-title">PRINT CONFIGURATION PANEL</div>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; padding-top:6px; flex:1;">
        
        <!-- LEFT COLUMN -->
        <div style="display:flex; flex-direction:column; gap:6px;">
          
          <div style="font-size:11px; font-weight:700; color:#1565C0; border-bottom:1px solid #E0E0E0; padding-bottom:4px; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px;">Format & Layout</div>
          
          <div style="display:grid; grid-template-columns:180px 1fr; gap:8px; align-items:center; margin-bottom:8px;">
            <label style="font-size:11px; font-weight:600; color:#424242; margin:0; text-transform:uppercase;">Default Bill Format</label>
            <select class="classic-erp-select" id="bps-format" tabindex="1">
              <option value="G01">G01 Half Page</option>
              <option value="G02">G02 Full Page</option>
              <option value="GST">GST Bill</option>
              <option value="Receipt">Bill With Receipt</option>
              <option value="Thermal">Thermal Receipt</option>
              <option value="Invoice">Maintenance Invoice</option>
            </select>
          </div>

          <div style="display:grid; grid-template-columns:180px 1fr; gap:8px; align-items:center; margin-bottom:12px;">
            <label style="font-size:11px; font-weight:600; color:#424242; margin:0; text-transform:uppercase;">Heading</label>
            <input type="text" class="classic-erp-input" id="bps-heading" list="bps-heading-list" tabindex="2" value="MAINTENANCE BILL">
            <datalist id="bps-heading-list">
              <option value="GST INVOICE">
              <option value="MAINTENANCE BILL">
              <option value="TAX INVOICE">
              <option value="RECEIPT CUM BILL">
            </datalist>
          </div>

          <div style="font-size:11px; font-weight:700; color:#1565C0; border-bottom:1px solid #E0E0E0; padding-bottom:4px; margin-bottom:10px; margin-top:10px; text-transform:uppercase; letter-spacing:0.5px;">Print Options</div>

          <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; margin-bottom:12px; padding-left:10px;">
            <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:11px; font-weight:600; color:#424242; text-transform:none; margin:0;">
              <input type="checkbox" id="bps-chk-bldg" tabindex="3" checked style="accent-color:#1565C0; width:14px; height:14px; margin:0;"> Print Bldg/Wing
            </label>
            <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:11px; font-weight:600; color:#424242; text-transform:none; margin:0;">
              <input type="checkbox" id="bps-chk-srno" tabindex="4" checked style="accent-color:#1565C0; width:14px; height:14px; margin:0;"> Show Sr.No.
            </label>
            <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:11px; font-weight:600; color:#424242; text-transform:none; margin:0;">
              <input type="checkbox" id="bps-chk-newpage" tabindex="5" style="accent-color:#1565C0; width:14px; height:14px; margin:0;"> New Page for Each Bill
            </label>
          </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div style="display:flex; flex-direction:column; gap:6px;">

          <div style="font-size:11px; font-weight:700; color:#1565C0; border-bottom:1px solid #E0E0E0; padding-bottom:4px; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.5px;">Advanced Modules</div>

          <div style="display:grid; grid-template-columns:180px 1fr; gap:8px; align-items:center; margin-bottom:8px;">
            <label style="font-size:11px; font-weight:600; color:#424242; margin:0; text-transform:uppercase;">Show QR Code</label>
            <select class="classic-erp-select" id="bps-qr" tabindex="9">
              <option value="none">None</option>
              <option value="upi">UPI QR</option>
              <option value="payment">Payment QR</option>
              <option value="dynamic">Dynamic Bill QR Rendering</option>
            </select>
          </div>

          <div style="display:grid; grid-template-columns:180px 1fr; gap:8px; align-items:center; margin-bottom:12px;">
            <label style="font-size:11px; font-weight:600; color:#424242; margin:0; text-transform:uppercase;">Show Sign (Identity Settings)</label>
            <select class="classic-erp-select" id="bps-sign" tabindex="10">
              <option value="none">None</option>
              <option value="sig">Signature</option>
              <option value="stamp">Stamp</option>
              <option value="seal">Seal</option>
            </select>
          </div>

          <div style="font-size:11px; font-weight:700; color:#1565C0; border-bottom:1px solid #E0E0E0; padding-bottom:4px; margin-bottom:10px; margin-top:10px; text-transform:uppercase; letter-spacing:0.5px;">Financial Displays</div>

          <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; margin-bottom:12px; padding-left:10px;">
            <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:11px; font-weight:600; color:#424242; text-transform:none; margin:0;">
              <input type="checkbox" id="bps-chk-arrears" tabindex="6" checked style="accent-color:#1565C0; width:14px; height:14px; margin:0;"> Show Bifurcation in Arrears
            </label>
            <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:11px; font-weight:600; color:#424242; text-transform:none; margin:0;">
              <input type="checkbox" id="bps-chk-receipt" tabindex="7" style="accent-color:#1565C0; width:14px; height:14px; margin:0;"> Show Blank Receipt
            </label>
            <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:11px; font-weight:600; color:#424242; text-transform:none; margin:0;">
              <input type="checkbox" id="bps-chk-blankhead" tabindex="8" style="accent-color:#1565C0; width:14px; height:14px; margin:0;"> Blank A/c Head
            </label>
          </div>

        </div>

      </div>
      
      <div style="display:flex; justify-content:flex-end; gap:8px; border-top:1px solid #E0E0E0; padding-top:14px; margin-top:20px; flex-shrink:0;">
        <button class="classic-erp-btn" tabindex="11" onclick="BPS.saveConfig()"><i class="bi bi-check-lg"></i> SAVE CONFIG</button>
        <button class="classic-erp-btn btn-danger-erp" tabindex="12" onclick="BPS.exit()"><i class="bi bi-x-circle"></i> CANCEL</button>
      </div>
    </div>
    
  </div>

  <!-- STATUS BAR -->
  <div style="background:var(--light-gray); border-top:1px solid var(--border-color); padding:4px 15px; font-size:11px; color:var(--text-muted); display:flex; justify-content:space-between; align-items:center; min-height:24px; flex-shrink:0;">
    <span id="bps-status-msg" style="font-weight:600;"><i class="bi bi-info-circle"></i> Ready</span>
    <span>Use Tab / Enter keys to navigate fields.</span>
  </div>

</div>

<script>
(function(){

  // Mock initial state
  var initialState = {
    format: 'G01',
    heading: 'MAINTENANCE BILL',
    bldg: true,
    srno: true,
    newpage: false,
    arrears: true,
    receipt: false,
    blankhead: false,
    qr: 'upi',
    sign: 'sig'
  };

  function toast(m, ok){
    if(typeof window.toast === 'function') {
      window.toast(m, ok ? 'success' : 'error');
    } else {
      var d=document.createElement('div');
      d.style.cssText='position:fixed;top:10px;right:10px;z-index:99999;padding:8px 16px;font-size:12px;font-weight:600;color:#FFF;box-shadow:2px 2px 6px rgba(0,0,0,0.3);background:'+(ok?'#006400':'#8B0000')+';border-top:1px solid '+(ok?'#00A000':'#FF0000')+';border-left:1px solid '+(ok?'#00A000':'#FF0000')+';border-right:1px solid #404040;border-bottom:1px solid #404040;';
      d.textContent=m;document.body.appendChild(d);
      setTimeout(function(){d.remove();},2500);
    }
  }

  function loadState(state){
    document.getElementById('bps-format').value = state.format;
    document.getElementById('bps-heading').value = state.heading;
    document.getElementById('bps-chk-bldg').checked = state.bldg;
    document.getElementById('bps-chk-srno').checked = state.srno;
    document.getElementById('bps-chk-newpage').checked = state.newpage;
    document.getElementById('bps-chk-arrears').checked = state.arrears;
    document.getElementById('bps-chk-receipt').checked = state.receipt;
    document.getElementById('bps-chk-blankhead').checked = state.blankhead;
    document.getElementById('bps-qr').value = state.qr;
    document.getElementById('bps-sign').value = state.sign;
  }

  window.BPS = {
    saveConfig: function(){
      // Update initial state conceptually
      initialState = {
        format: document.getElementById('bps-format').value,
        heading: document.getElementById('bps-heading').value,
        bldg: document.getElementById('bps-chk-bldg').checked,
        srno: document.getElementById('bps-chk-srno').checked,
        newpage: document.getElementById('bps-chk-newpage').checked,
        arrears: document.getElementById('bps-chk-arrears').checked,
        receipt: document.getElementById('bps-chk-receipt').checked,
        blankhead: document.getElementById('bps-chk-blankhead').checked,
        qr: document.getElementById('bps-qr').value,
        sign: document.getElementById('bps-sign').value
      };
      localStorage.setItem('jeevika_bps_config', JSON.stringify(initialState));
      toast('Bill Print Settings saved globally.', true);
      document.getElementById('bps-status-msg').textContent = 'Configuration Saved.';
    },

    resetConfig: function(){
      var saved = localStorage.getItem('jeevika_bps_config');
      if (saved) {
        try {
          initialState = JSON.parse(saved);
        } catch(e){}
      }
      loadState(initialState);
      toast('Settings reset to last saved state.', true);
      document.getElementById('bps-status-msg').textContent = 'Configuration Reset.';
    },

    previewBill: function(){
      var w = window.open('', '_blank', 'width=800,height=600');
      var head = document.getElementById('bps-heading').value || 'SOCIETY BILL';
      var qrOpt = document.getElementById('bps-qr').value;
      var format = document.getElementById('bps-format').value;
      var signOpt = document.getElementById('bps-sign').value;

      var html = '<html><head><title>Bill Preview</title><style>body{font-family:Arial,sans-serif;font-size:12px;margin:20px;} .bill-box{border:1px solid #000;padding:20px;max-width:700px;margin:0 auto;} h2{text-align:center;text-decoration:underline;margin-bottom:20px;font-size:18px;} .details{display:flex;justify-content:space-between;margin-bottom:20px;} table{width:100%;border-collapse:collapse;margin-bottom:20px;} th,td{border:1px solid #000;padding:5px;} .footer{display:flex;justify-content:space-between;align-items:end;margin-top:40px;height:100px;} .qr{width:80px;height:80px;border:1px solid #CCC;display:flex;align-items:center;justify-content:center;background:#EEE;} .sign{border-top:1px solid #000;width:150px;text-align:center;padding-top:5px;}</style></head><body>';
      
      html += '<div class="bill-box">';
      html += '<h2>'+head+'</h2>';
      html += '<div class="details"><div><strong>Member:</strong> Mr. Sharma<br><strong>Flat:</strong> A-101</div><div><strong>Bill No:</strong> 1001<br><strong>Date:</strong> 01-May-2026</div></div>';
      
      html += '<table><thead><tr><th>Particulars</th><th>Amount (Rs.)</th></tr></thead><tbody>';
      html += '<tr><td>Maintenance Charges</td><td>2500.00</td></tr>';
      html += '<tr><td>Sinking Fund</td><td>500.00</td></tr>';
      html += '<tr><td><strong>Total Amount</strong></td><td><strong>3000.00</strong></td></tr>';
      html += '</tbody></table>';

      html += '<div class="footer">';
      if(qrOpt !== 'none'){
         html += '<div class="qr">['+qrOpt.toUpperCase()+' QR]</div>';
      } else {
         html += '<div></div>';
      }
      
      if(signOpt !== 'none'){
         html += '<div class="sign">Authorised '+signOpt.toUpperCase()+'</div>';
      } else {
         html += '<div></div>';
      }
      
      html += '</div></div></body></html>';
      
      w.document.write(html);
      w.document.close();
      toast('Generating live ERP bill preview...', true);
    },

    toggleOtherMenu: function(event){
      // Handled via CSS hover
    },

    action: function(name){
      toast('Executing: ' + name, true);
    },

    exit: function(){
      if(typeof WorkspaceManager!=='undefined') {
         WorkspaceManager.closeTab('bill-print-setup');
      } else {
         var panel = document.getElementById('bps-panel');
         if(panel) { panel.style.display = 'none'; }
      }
    }
  };

  // Close dropdowns handled via CSS hover

  // Setup Keyboard Navigation inside Config Panel
  document.addEventListener('keydown', function(e){
    var p = document.getElementById('bps-panel');
    if(!p || !p.offsetParent) return;

    if(e.key === 'Enter'){
      var act = document.activeElement;
      if(act.tagName === 'INPUT' || act.tagName === 'SELECT' || act.tagName === 'BUTTON'){
         if(act.tagName === 'BUTTON') act.click();
         else {
            // Focus next
            var els = Array.from(document.querySelectorAll('#bps-panel [tabindex]')).sort(function(a,b){ return parseInt(a.getAttribute('tabindex')) - parseInt(b.getAttribute('tabindex')); });
            var idx = els.indexOf(act);
            if(idx >= 0 && idx < els.length-1) els[idx+1].focus();
         }
      }
    }
  });

  // Init
  var saved = localStorage.getItem('jeevika_bps_config');
  if (saved) {
    try {
      initialState = JSON.parse(saved);
    } catch(e){}
  }
  loadState(initialState);
  document.getElementById('bps-format').focus();

})();
</script>
