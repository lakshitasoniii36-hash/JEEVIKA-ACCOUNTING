<style>
.sd-wrap{font-size:.82rem;}
.sd-section{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);padding:1rem 1.25rem;margin-bottom:1rem;}
.sd-section-title{font-size:.8rem;font-weight:700;color:#FF8C42;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid #FFE8D6;display:flex;align-items:center;gap:.4rem;}
.sd-wrap .form-label{font-size:.75rem;font-weight:600;color:#495057;margin-bottom:.2rem;}
.sd-wrap .form-control,.sd-wrap .form-select{font-size:.8rem;padding:.3rem .5rem;height:30px;border-radius:5px;}
.sd-wrap textarea.form-control{height:auto;min-height:28px;}
.sd-wrap .form-check{font-size:.78rem;}
.sd-wrap .form-check-input{width:14px;height:14px;margin-top:.2rem;}
.sd-toolbar{background:#fff;border-radius:10px;padding:.65rem 1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.sd-toolbar .btn{font-size:.82rem;padding:.4rem 1rem;}
.sd-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.sd-grid-full{grid-column:1/-1;}
.remark-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem;}
.remark-row input[type="text"]{flex:1;font-size:.78rem;padding:.2rem .4rem;height:26px;}
.remark-row .form-check-input{width:13px;height:13px;}
.remark-label{font-size:.72rem;color:#6c757d;min-width:20px;text-align:right;}
@media(max-width:900px){.sd-grid{grid-template-columns:1fr;}}
</style>

<div class="sd-wrap">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div>
      <h5 class="mb-0" style="font-weight:700;"><i class="bi bi-building-gear me-2" style="color:#FF8C42;"></i>Society Configuration</h5>
      <small class="text-muted">Legacy SocInfo — Full Configuration (33 fields)</small>
    </div>
  </div>

  <div class="sd-toolbar">
    <div>
      <button class="btn btn-sm" id="sdBtnSave" style="background:linear-gradient(135deg,#FFB380,#FF8C42);color:#fff;font-weight:600;"><i class="bi bi-check-circle me-1"></i>Save Configuration</button>
      <button class="btn btn-sm btn-outline-secondary ms-2" id="sdBtnReload"><i class="bi bi-arrow-clockwise me-1"></i>Reload</button>
    </div>
    <div class="text-muted small" id="sdStatus">Loading...</div>
  </div>

  <div class="sd-grid">
    <!-- Section A: Society Details -->
    <div class="sd-section">
      <div class="sd-section-title"><i class="bi bi-building"></i> Society Details</div>
      <div class="row g-2">
        <div class="col-12"><label class="form-label">Society Name</label><input class="form-control" id="sdSocName" maxlength="150"></div>
        <div class="col-12"><label class="form-label">Registration No.</label><input class="form-control" id="sdSocRegnno" maxlength="80"></div>
        <div class="col-12"><label class="form-label">Address</label><textarea class="form-control" id="sdSocAddress" rows="2" maxlength="255"></textarea></div>
        <div class="col-6"><label class="form-label">PAN</label><input class="form-control" id="sdPAN" maxlength="50" style="text-transform:uppercase;"></div>
        <div class="col-6"><label class="form-label">TAN</label><input class="form-control" id="sdTAN" maxlength="50"></div>
        <div class="col-6"><label class="form-label">GSTIN</label><input class="form-control" id="sdSTAX" maxlength="50" style="text-transform:uppercase;"></div>
        <div class="col-6"><label class="form-label">P.Tax No.</label><input class="form-control" id="sdPTAX" maxlength="50"></div>
        <div class="col-6"><label class="form-label">Email</label><input class="form-control" id="sdSocEmail" maxlength="80" type="email"></div>
        <div class="col-6"><label class="form-label">Telephone</label><input class="form-control" id="sdSocTelephone" maxlength="80"></div>
      </div>
    </div>

    <!-- Section B: Interest & Defaults -->
    <div class="sd-section">
      <div class="sd-section-title"><i class="bi bi-percent"></i> Interest & Default Settings</div>
      <div class="row g-2">
        <div class="col-6"><label class="form-label">Interest Type</label>
          <select class="form-select" id="sdIntType"><option>Simple</option><option>Compound</option></select>
        </div>
        <div class="col-6"><label class="form-label">Interest Method</label>
          <select class="form-select" id="sdIntMethod"><option>Monthly</option><option>Quarterly</option><option>Half Yearly</option><option>Yearly</option></select>
        </div>
        <div class="col-4"><label class="form-label">Int. Rate %</label><input type="number" step="0.01" class="form-control text-end" id="sdIntRate" value="0"></div>
        <div class="col-4"><label class="form-label">Int. Rounded</label><input type="number" class="form-control text-end" id="sdIntRounded" value="0"></div>
        <div class="col-4"><label class="form-label">Priority</label>
          <select class="form-select" id="sdIntPriority"><option>Interest First</option><option>Principal First</option></select>
        </div>
        <div class="col-6"><label class="form-label">Default Cash A/c</label>
          <select class="form-select" id="sdDefaCash"><option value="0">— Select —</option></select>
        </div>
        <div class="col-6"><label class="form-label">Default Interest A/c</label>
          <select class="form-select" id="sdDefaint"><option value="0">— Select —</option></select>
        </div>
        <div class="col-6"><label class="form-label">Default Debtor A/c</label>
          <select class="form-select" id="sdDefaDebtor"><option value="0">— Select —</option></select>
        </div>
        <div class="col-6"><label class="form-label">Default Creditor A/c</label>
          <select class="form-select" id="sdDefaCreditor"><option value="0">— Select —</option></select>
        </div>
        <div class="col-6"><label class="form-label">Show Zero Balances</label>
          <select class="form-select" id="sdZero"><option value="Y">Yes</option><option value="N">No</option></select>
        </div>
        <div class="col-6"><label class="form-label">Area Type</label>
          <select class="form-select" id="sdAreatype"><option>Sq.Ft.</option><option>Sq.Mt.</option></select>
        </div>
      </div>
    </div>

    <!-- Section C: Signatures & Authorization -->
    <div class="sd-section">
      <div class="sd-section-title"><i class="bi bi-pen"></i> Signatures & Authorization</div>
      <div class="row g-2">
        <div class="col-12"><label class="form-label">Receipt Signature</label><input class="form-control" id="sdRec_Signature" maxlength="80"></div>
        <div class="col-12"><label class="form-label">Voucher Signature</label><input class="form-control" id="sdVoucher_Signature" maxlength="80"></div>
        <div class="col-8"><label class="form-label">Authorization Ledger</label><input class="form-control" id="sdAuthoLed" maxlength="80"></div>
        <div class="col-4"><label class="form-label">Auth. Amount</label><input type="number" step="0.01" class="form-control text-end" id="sdAuthoAmt" value="0"></div>
        <div class="col-12"><label class="form-label">Society Message</label><input class="form-control" id="sdSocMessage" maxlength="80" placeholder="Message printed on reports"></div>
      </div>
    </div>

    <!-- Section D: Billing Remarks (7 lines) -->
    <div class="sd-section">
      <div class="sd-section-title"><i class="bi bi-card-text"></i> Billing Remarks & Footer</div>
      <div class="mb-1" style="font-size:.72rem;color:#6c757d;">Billing remarks printed on member bills:</div>
      <div class="remark-row"><span class="remark-label">1</span><input type="text" class="form-control" id="sdRemarks" maxlength="255" placeholder="Remark Line 1"></div>
      <div class="remark-row"><span class="remark-label">2</span><input type="text" class="form-control" id="sdRemarks1" maxlength="255" placeholder="Remark Line 2"></div>
      <div class="remark-row"><span class="remark-label">3</span><input type="text" class="form-control" id="sdRemarks2" maxlength="255" placeholder="Remark Line 3"></div>
      <div class="remark-row"><span class="remark-label">4</span><input type="text" class="form-control" id="sdRemarks3" maxlength="255" placeholder="Remark Line 4"></div>
      <div class="remark-row"><span class="remark-label">5</span><input type="text" class="form-control" id="sdRemarks4" maxlength="255" placeholder="Remark Line 5"></div>
      <div class="remark-row"><span class="remark-label">6</span><input type="text" class="form-control" id="sdRemarks5" maxlength="255" placeholder="Remark Line 6"></div>
      <div class="remark-row"><span class="remark-label">7</span><input type="text" class="form-control" id="sdRemarks6" maxlength="255" placeholder="Footer / B.Sheet Remark"></div>
      <div class="mt-2">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="sdRemarks7" checked>
          <label class="form-check-label" for="sdRemarks7">Print Remarks on Bill (Remarks7=Yes)</label>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var API_INFO='http://localhost:5002/api/society/info';
  var API_ACC='http://localhost:5002/api/account';
  var socInfo=null;

  function toast(m,ok){
    var d=document.createElement('div');
    d.className='alert alert-'+(ok?'success':'danger')+' alert-dismissible fade show';
    d.style.cssText='position:fixed;top:20px;right:20px;z-index:99999;min-width:300px;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);';
    d.innerHTML='<i class="bi bi-'+(ok?'check-circle':'exclamation-triangle')+' me-2"></i>'+m+'<button type="button" class="btn-close" data-bs-dismiss="alert"></button>';
    document.body.appendChild(d);
    setTimeout(function(){if(d.parentNode)d.remove();},4000);
  }

  function loadAccounts(){
    var token=localStorage.getItem('authToken')||'';
    fetch(API_ACC,{headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}})
    .then(function(r){return r.json();})
    .then(function(d){
      var accs=(d.success&&d.data)?d.data:[];
      ['sdDefaCash','sdDefaint','sdDefaDebtor','sdDefaCreditor'].forEach(function(sid){
        var sel=document.getElementById(sid);
        if(!sel)return;
        sel.innerHTML='<option value="0">— Select —</option>';
        for(var i=0;i<accs.length;i++){
          var a=accs[i];
          sel.innerHTML+='<option value="'+(a.id||a.socAccId||0)+'">'+(a.accName||a.AccName||'')+'</option>';
        }
      });
      if(socInfo) populateDefaults();
    }).catch(function(){});
  }

  function populateDefaults(){
    if(!socInfo)return;
    ['sdDefaCash','sdDefaint','sdDefaDebtor','sdDefaCreditor'].forEach(function(sid){
      var key=sid.replace('sd','').charAt(0).toLowerCase()+sid.replace('sd','').slice(1);
      var sel=document.getElementById(sid);
      if(sel&&socInfo[key]!=null) sel.value=''+socInfo[key];
    });
  }

  function loadInfo(){
    var token=localStorage.getItem('authToken')||'';
    document.getElementById('sdStatus').textContent='Loading...';
    fetch(API_INFO,{headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.success&&d.data){
        socInfo=d.data;
        fillForm(socInfo);
        document.getElementById('sdStatus').textContent='Loaded — SocInfo ID: '+(socInfo.sId||socInfo.sid||'N/A');
      } else {
        document.getElementById('sdStatus').textContent='No SocInfo record found. Save to create one.';
      }
    }).catch(function(e){
      document.getElementById('sdStatus').textContent='API Error: '+e.message;
    });
  }

  function fillForm(d){
    var map={
      sdSocName:d.socName,sdSocRegnno:d.socRegnno,sdSocAddress:d.socAddress,
      sdPAN:d.pan,sdTAN:d.tan,sdSTAX:d.stax,sdPTAX:d.ptax,
      sdSocEmail:d.socEmail,sdSocTelephone:d.socTelephone,
      sdIntType:d.intType,sdIntMethod:d.intMethod,sdIntRate:d.intRate,sdIntRounded:d.intRounded,
      sdIntPriority:d.intPriority,sdZero:d.zero,sdAreatype:d.areatype,
      sdRec_Signature:d.rec_Signature,sdVoucher_Signature:d.voucher_Signature,
      sdAuthoLed:d.authoLed,sdAuthoAmt:d.authoAmt,sdSocMessage:d.socMessage,
      sdRemarks:d.remarks,sdRemarks1:d.remarks1,sdRemarks2:d.remarks2,
      sdRemarks3:d.remarks3,sdRemarks4:d.remarks4,sdRemarks5:d.remarks5,sdRemarks6:d.remarks6
    };
    for(var id in map){
      var el=document.getElementById(id);
      if(el&&map[id]!=null) el.value=map[id];
    }
    var chk=document.getElementById('sdRemarks7');
    if(chk) chk.checked=(d.remarks7==='Yes'||d.remarks7==='yes');
    populateDefaults();
  }

  function collectForm(){
    return {
      socName:document.getElementById('sdSocName').value.trim(),
      socRegnno:document.getElementById('sdSocRegnno').value.trim(),
      socAddress:document.getElementById('sdSocAddress').value.trim(),
      pan:document.getElementById('sdPAN').value.trim(),
      tan:document.getElementById('sdTAN').value.trim(),
      stax:document.getElementById('sdSTAX').value.trim(),
      ptax:document.getElementById('sdPTAX').value.trim(),
      socEmail:document.getElementById('sdSocEmail').value.trim(),
      socTelephone:document.getElementById('sdSocTelephone').value.trim(),
      intType:document.getElementById('sdIntType').value,
      intMethod:document.getElementById('sdIntMethod').value,
      intRate:parseFloat(document.getElementById('sdIntRate').value)||0,
      intRounded:parseInt(document.getElementById('sdIntRounded').value)||0,
      intPriority:document.getElementById('sdIntPriority').value,
      defaCash:parseInt(document.getElementById('sdDefaCash').value)||0,
      defaint:parseInt(document.getElementById('sdDefaint').value)||0,
      defaDebtor:parseInt(document.getElementById('sdDefaDebtor').value)||0,
      defaCreditor:parseInt(document.getElementById('sdDefaCreditor').value)||0,
      zero:document.getElementById('sdZero').value,
      areatype:document.getElementById('sdAreatype').value,
      rec_Signature:document.getElementById('sdRec_Signature').value.trim(),
      voucher_Signature:document.getElementById('sdVoucher_Signature').value.trim(),
      authoLed:document.getElementById('sdAuthoLed').value.trim(),
      authoAmt:parseFloat(document.getElementById('sdAuthoAmt').value)||0,
      socMessage:document.getElementById('sdSocMessage').value.trim(),
      remarks:document.getElementById('sdRemarks').value.trim(),
      remarks1:document.getElementById('sdRemarks1').value.trim(),
      remarks2:document.getElementById('sdRemarks2').value.trim(),
      remarks3:document.getElementById('sdRemarks3').value.trim(),
      remarks4:document.getElementById('sdRemarks4').value.trim(),
      remarks5:document.getElementById('sdRemarks5').value.trim(),
      remarks6:document.getElementById('sdRemarks6').value.trim(),
      remarks7:document.getElementById('sdRemarks7').checked?'Yes':'No'
    };
  }

  function saveInfo(){
    var body=collectForm();
    if(!body.socName){toast('Society Name is required',false);return;}
    var token=localStorage.getItem('authToken')||'';
    document.getElementById('sdStatus').textContent='Saving...';
    fetch(API_INFO,{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.success){toast('Configuration saved!',true);document.getElementById('sdStatus').textContent='Saved successfully';loadInfo();}
      else{toast(d.message||'Save failed',false);document.getElementById('sdStatus').textContent='Save failed';}
    }).catch(function(e){toast('Server error: '+e.message,false);document.getElementById('sdStatus').textContent='Error';});
  }

  function init(){
    document.getElementById('sdBtnSave').addEventListener('click',saveInfo);
    document.getElementById('sdBtnReload').addEventListener('click',function(){loadAccounts();loadInfo();});
    loadAccounts();
    loadInfo();
  }
  setTimeout(init,80);
})();
</script>
